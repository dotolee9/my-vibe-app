name: Deploy Web (Vercel)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  wait-for-deployment:
    name: Wait for Vercel Deployment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    environment:
      name: production
      url: ${{ steps.deployment.outputs.url }}

    steps:
      - name: Wait for Vercel deployment
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "Waiting for Vercel deployment for commit: $COMMIT_SHA"

          for i in $(seq 1 60); do
            RESPONSE=$(curl -s \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=10" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}")

            DEPLOYMENT=$(echo "$RESPONSE" | jq -r \
              --arg sha "$COMMIT_SHA" \
              '[.deployments[] | select(.meta.githubCommitSha == $sha)] | first // empty')

            if [ -n "$DEPLOYMENT" ] && [ "$DEPLOYMENT" != "null" ]; then
              STATE=$(echo "$DEPLOYMENT" | jq -r '.readyState')
              URL=$(echo "$DEPLOYMENT" | jq -r '.url')

              echo "State: $STATE  |  URL: https://$URL"

              if [ "$STATE" = "READY" ]; then
                echo "url=https://$URL" >> "$GITHUB_OUTPUT"
                echo "Deployment successful: https://$URL"
                exit 0
              elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
                echo "Deployment failed with state: $STATE"
                exit 1
              fi
            else
              echo "[$i/60] Deployment not found yet, waiting..."
            fi

            sleep 15
          done

          echo "Timeout: deployment not completed within 15 minutes"
          exit 1
